<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mech Tide — hold the center</title>
  <meta name="description" content="Robots close in from every angle — survive the waves, upgrade your turret, and hold the center. Free in your browser." />
  <meta name="theme-color" content="#0a1424" />

  <!-- Link preview / "unfurl" card: Facebook, iMessage, Slack, Discord, LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Mech Tide" />
  <meta property="og:title" content="Mech Tide — hold the center" />
  <meta property="og:description" content="Robots close in from every angle — survive the waves, upgrade your turret, and hold the center. Free in your browser." />
  <meta property="og:url" content="https://mechtide.com/" />
  <meta property="og:image" content="https://mechtide.com/og-image-v2.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Mech Tide — hold the center against robots from every angle." />

  <!-- X / Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mech Tide — hold the center" />
  <meta name="twitter:description" content="Robots from every angle. Hold the center. Free in your browser." />
  <meta name="twitter:image" content="https://mechtide.com/og-image-v2.png" />

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/src/styles.css" />
  <!-- ?reset save-wipe; external (not inline) so prod CSP stays script-src 'self' -->
  <script src="/reset.js"></script>
</head>
<body>
  <div id="stage">
    <div id="game"></div>

    <!-- DOM/CSS HUD overlay — real HTML floating over the WebGL battle -->
    <div id="toasts"></div>
    <div id="hud">
      <div class="hud-top">
        <div class="panel badge-group">
          <span class="badge level">LEVEL <b id="hud-level">1</b></span>
          <span class="divider"></span>
          <span class="badge wave">WAVE <b id="hud-wave">1/7</b></span>
        </div>
        <div class="panel integrity">
          <div class="int-row"><label>TOWER HEALTH</label><span id="hud-hp-text" class="int-num">100 / 100</span></div>
          <div class="bar"><div id="hud-hp" class="fill"></div></div>
        </div>
        <div class="panel counters">
          <span class="coin-icon stack"></span><b id="hud-money" class="money">0</b>
          <span class="divider"></span>
          <span class="core-icon"></span><b id="hud-cores" class="cores">0</b>
          <span class="divider"></span>
          <button id="hud-gear" class="gear" title="Settings">&#9881;</button>
        </div>
      </div>
      <div class="hud-status">
        <div id="st-shield" class="st-chip cyan hidden">SHIELD <b>2</b></div>
        <div id="st-combo" class="st-chip gold hidden">COMBO x<b>5</b></div>
        <div id="st-rapid" class="st-chip orange hidden">RAPID FIRE!</div>
      </div>
      <div class="hud-bottom">
        <div class="hud-corner skills-corner">
          <span class="corner-label">SKILL TREE</span>
          <button id="btn-skills" class="hud-btn">
            <span class="btn-icon skills"><span class="tree-glyph"></span></span>
            <span class="btn-text">Skill Tree&ensp;<kbd>T</kbd></span>
          </button>
        </div>
        <div id="ult-wrap" class="ult-wrap hidden">
          <div id="ult-name" class="ult-name">FREEZE BOMB</div>
          <button id="st-ult" class="ult-circle">
            <span id="ult-icon" class="ult-icon"></span>
            <span id="ult-state" class="ult-state">FIRE</span>
          </button>
          <kbd class="ult-kbd">Space</kbd>
        </div>
        <div class="hud-corner shop-corner">
          <span class="corner-label">UPGRADES</span>
          <button id="btn-shop" class="hud-btn">
            <span class="btn-icon shop"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 4l7 13H5z"/></svg></span>
            <span class="btn-text">Upgrades&ensp;<kbd>Tab</kbd></span>
          </button>
        </div>
      </div>
      <div id="wave-intro" class="wave-intro hidden">
        <div class="wi-level" id="wi-level">LEVEL 1</div>
        <div class="wi-wave" id="wi-wave">WAVE 1</div>
        <div class="wi-count" id="wi-count">3</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
